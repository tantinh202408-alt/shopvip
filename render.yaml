services:
  - type: web
    name: mmoshop
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ASSET_SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: EMAIL_PROVIDER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: IMGBB_API_KEY
        sync: false
      - key: JWT_EXPIRES_IN
        sync: false
      - key: LINK4M_API_ENDPOINT
        sync: false
      - key: LINK4M_API_KEY
        sync: false
      - key: MAX_FILE_SIZE
        sync: false
      - key: PRIMARY_ADMIN_EMAIL
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CRON_JOB_TOKEN
        sync: false
      - key: CRON_JOB_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: IS_SECONDARY_SERVER
        sync: false
      - key: MAIN_SERVER_URL
        sync: false

