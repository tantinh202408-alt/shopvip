worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream sangdev_app {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # Lop ngoai cung: toi da 10 request auth trong 10 giay / IP.
    # Lop khoa 10 ngay duoc backend xu ly va redirect ve /blocked-ip.html.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;

    server {
        listen 80;
        server_name _;
        proxy_intercept_errors on;
        error_page 429 =302 /blocked-ip.html;

        location = /blocked-ip.html {
            proxy_pass http://sangdev_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/auth/(login|register)$ {
            limit_req zone=auth_limit burst=9 nodelay;
            limit_req_status 429;

            proxy_pass http://sangdev_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://sangdev_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
