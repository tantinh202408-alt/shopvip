<div class="container mxh-list-page">
    <!-- Hero -->
    <div class="mxh-list-hero">
        <img class="mxh-banner-img" src="/img/banermxh.png" alt="Banner MXH">
    </div>

    <div class="mxh-filter-strip">
        <div class="mxh-filter-strip-title">
            <span class="mxh-filter-kicker">Phân loại MXH</span>
        </div>

        <!-- Platform filter tabs -->
        <div class="mxh-platform-tabs-wrap">
            <div class="mxh-platform-tabs" id="mxh-platform-tabs">
                <button class="mxh-tab-btn active" data-platform="all" style="--pcolor:#6366f1">
                    <span class="mxh-tab-icon"><i class="fas fa-globe"></i></span>
                    <span class="mxh-tab-copy"><strong>Tất cả</strong></span>
                    <span class="mxh-tab-count">0</span>
                </button>
            </div>
        </div>

        <!-- Category chips + Sort -->
        <div class="mxh-filter-bar">
            <div class="mxh-category-chips" id="mxh-category-chips">
                <button class="mxh-chip active" data-cat="" style="--chip-color:#6366f1">
                    <span class="mxh-chip-icon"><i class="fas fa-layer-group"></i></span>
                    <span class="mxh-chip-copy"><strong>Tất cả loại</strong></span>
                </button>
            </div>
            <div class="mxh-sort-wrap">
                <label for="mxh-sort" class="mxh-sort-label">Sắp xếp</label>
                <select id="mxh-sort" class="mxh-sort-select">
                    <option value="newest">Mới nhất</option>
                    <option value="price_asc">Giá tăng dần</option>
                    <option value="price_desc">Giá giảm dần</option>
                    <option value="popular">Phổ biến</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Product grid -->
    <div id="mxh-grid" class="mxh-grid"></div>

    <!-- Pagination -->
    <div id="mxh-pagination" class="pagination"></div>
</div>

<!-- MXH Account Detail Modal -->
<div id="mxh-detail-modal" class="mxh-detail-modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="mxh-detail-modal">
        <button class="mxh-detail-close" id="mxh-detail-close" aria-label="Đóng">
            <i class="fas fa-xmark"></i>
        </button>
        <div id="mxh-detail-content" class="mxh-detail-content"></div>
    </div>
</div>
