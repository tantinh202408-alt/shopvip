<div class="container reward-page reward-checkin-page">
    <div class="reward-layout">
        <section class="reward-main">
            <div class="section-card checkin-highlight-card">
                <div class="checkin-highlight-surface">
                    <div class="checkin-highlight-top">
                        <div>
                            <div id="checkin-next-kicker" class="profile-section-kicker">Trạng thái hôm nay</div>
                            <h2 id="checkin-next-title" class="checkin-highlight-title">Sẵn sàng</h2>
                            <p id="checkin-help-text" class="section-subtitle">Bấm điểm danh để nhận thưởng hôm nay.</p>
                        </div>
                        <div id="checkin-next-amount" class="checkin-highlight-amount">0đ</div>
                    </div>

                    <div class="checkin-insight-grid">
                        <div class="checkin-insight-card">
                            <span>Streak</span>
                            <strong id="checkin-streak-value">0 ngày</strong>
                        </div>
                        <div class="checkin-insight-card">
                            <span>Ngày</span>
                            <strong id="checkin-today-value">--</strong>
                        </div>
                        <div class="checkin-insight-card">
                            <span>Trạng thái</span>
                            <strong id="checkin-status-text">Đang tải</strong>
                        </div>
                    </div>

                    <div class="checkin-actions">
                        <button id="checkin-claim-btn" class="btn-primary">Điểm danh hôm nay</button>
                    </div>
                </div>
            </div>

            <div class="section-card checkin-history-card">
                <div class="section-header">
                    <div>
                        <h3 class="section-title">Lịch sử điểm danh</h3>
                    </div>
                </div>
                <div id="checkin-history" class="reward-history"></div>
            </div>
        </section>
    </div>
</div>
