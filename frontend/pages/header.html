<div class="header-wrapper">
    <div class="container">
        <div class="header-content">
            <!-- Logo -->
            <div class="header-brand">
                <div id="account-side-menu-slot" class="header-side-menu-slot"></div>
                <div class="logo">
                    <a href="/" data-link>
                        <i class="fas fa-code"></i>
                        <span>Sang dev</span>
                    </a>
                </div>
            </div>

            <!-- Search -->
            <div class="header-search">
                <form id="search-form">
                    <input type="text" placeholder="Tìm kiếm sản phẩm..." name="q">
                    <button type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>

            <!-- Navigation -->
            <nav class="header-nav">
                <a href="/" data-link>Trang chủ</a>
                <a href="/feed" data-link>Feed</a>
                <a href="/congdong" data-link class="header-nav-link-with-badge">Cộng đồng<span id="community-nav-badge" class="header-nav-badge" style="display:none;">0</span></a>
                <a href="/baidang" data-link>Bài đăng</a>
            </nav>

            <!-- User actions -->
            <div class="header-actions">
                <button type="button" id="theme-toggle" class="btn-ghost theme-toggle" aria-label="Chuyển giao diện sáng tối" title="Chuyển giao diện sáng tối">
                    <i class="fas fa-moon"></i>
                    <span class="sr-only">Chuyển giao diện sáng tối</span>
                </button>
                <div id="user-section">
                    <!-- User info sẽ được load bằng JS -->
                </div>
            </div>
        </div>
    </div>
</div>
