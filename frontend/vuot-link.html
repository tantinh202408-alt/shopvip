<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lấy key nhiệm vụ</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(9, 15, 30, 0.75)), url('/img/OIP.png') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: #f8fafc;
            padding: 20px;
            box-sizing: border-box;
        }
        main {
            width: min(480px, 100%);
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #6366f1, #14b8a6);
        }
        .icon-shield {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(99, 102, 241, 0.25);
        }
        h1 {
            margin: 0 0 10px;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            font-size: 13.5px;
            line-height: 1.6;
            margin: 0 0 24px;
        }
        code {
            display: block;
            word-break: break-all;
            background: rgba(15, 23, 42, 0.6);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.15);
            padding: 16px;
            border-radius: 16px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 700;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.05em;
        }
        .actions {
            display: grid;
            gap: 12px;
        }
        button, a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 48px;
            padding: 0 20px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 750;
            font-size: 14.5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            color: #f8fafc;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        button:hover, a:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }
        .primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }
        .primary:hover {
            background: linear-gradient(135deg, #059669, #047857);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    <audio id="bg-music" src="/audio/SaveTik.io_7638498349515066644.mp3" loop></audio>

    <main>
        <div class="icon-shield">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>Mã khóa xác thực</h1>
        <p>Key nhiệm vụ của bạn đã sẵn sàng. Sao chép và quay về dán lại để hoàn thành nhiệm vụ.</p>
        <code id="key-output">Đang tải...</code>
        
        <div class="actions">
            <button class="primary" id="copy-btn" type="button">
                <i class="fa-regular fa-copy"></i> Sao chép mã Key
            </button>
            <a href="/nhiemvu">
                <i class="fa-solid fa-arrow-left"></i> Quay lại trang nhiệm vụ
            </a>
        </div>
    </main>

    <script>
        // Extract token
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';
        const output = document.getElementById('key-output');
        output.textContent = token || 'Không có mã key hợp lệ.';

        // Copy key handler
        const copyBtn = document.getElementById('copy-btn');
        copyBtn.addEventListener('click', async () => {
            if (!token) return;
            try {
                await navigator.clipboard.writeText(token);
                const oldContent = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Đã sao chép!';
                copyBtn.style.background = '#059669';
                setTimeout(() => {
                    copyBtn.innerHTML = oldContent;
                    copyBtn.style.background = '';
                }, 2000);
            } catch (err) {
                console.error('Lỗi khi sao chép key:', err);
            }
        });

        // Background music autoplay & interaction bypass
        const music = document.getElementById('bg-music');
        music.volume = 0.5;

        function playMusic() {
            music.play().then(() => {
                console.log('Music started playing');
            }).catch(() => {
                const playOnAction = () => {
                    music.play().catch(e => console.error(e));
                    document.removeEventListener('click', playOnAction);
                    document.removeEventListener('keydown', playOnAction);
                };
                document.addEventListener('click', playOnAction);
                document.addEventListener('keydown', playOnAction);
            });
        }

        playMusic();
    </script>
</body>
</html>
