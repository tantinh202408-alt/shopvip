    <script>
        (function initTheme() {
            try {
                const storageKey = 'site-theme-mode';
                const saved = localStorage.getItem(storageKey);
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = saved === 'light' || saved === 'dark' ? saved : (prefersDark ? 'dark' : 'light');
                document.documentElement.dataset.theme = theme;
                document.documentElement.style.colorScheme = theme;
            } catch (_) {
                document.documentElement.dataset.theme = 'light';
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>

    <!-- Block DevTools before page loading -->
    <script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>
    <script>
        (function() {
            try {
                const hostname = window.location.hostname;
                const isLocal = hostname === 'localhost' || 
                                hostname === '127.0.0.1' || 
                                hostname === '[::1]' || 
                                hostname.startsWith('192.168.') || 
                                hostname.startsWith('10.') || 
                                /^172\.(1[6-9]|2\d|3[0-1])\./.test(hostname) ||
                                hostname.endsWith('.local');
                
                if (isLocal) {
                    console.log('Local development environment detected. DevTools blocker disabled.');
                    return;
                }

                if (typeof DisableDevtool !== 'undefined') {
                    DisableDevtool({
                        ondevtoolopen: (type) => {
                            window.location.href = 'about:blank';
                        },
                        clearIntervalWhenOpen: true,
                        clearLog: true,
                        disableMenu: true
                    });
                }
            } catch (err) {
                // Fail silently to not impact normal user experience
            }
        })();
    </script>
